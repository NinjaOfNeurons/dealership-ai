<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoEdge Motors — AI Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      width: 100%;
      background: #1a1a2e;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-circle {
      width: 36px; height: 36px; border-radius: 50%;
      background: #4f46e5;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white;
    }
    .header-info h1 { font-size: 15px; font-weight: 600; }
    .header-info p { font-size: 12px; color: #9ca3af; }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; margin-left: auto;
      box-shadow: 0 0 0 2px rgba(34,197,94,0.3);
    }
    .main {
      width: 100%; max-width: 720px;
      flex: 1; display: flex; flex-direction: column;
      padding: 0 16px 16px;
    }
    .chat-window {
      flex: 1; overflow-y: auto;
      padding: 20px 0;
      display: flex; flex-direction: column; gap: 12px;
      min-height: calc(100vh - 220px);
    }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.user { flex-direction: row-reverse; }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: white; flex-shrink: 0;
    }
    .avatar.user-av { background: #4f46e5; }
    .col-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 75%; }
    .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
    .bubble.ai { background: white; color: #111; border-bottom-left-radius: 4px; border: 1px solid #e5e7eb; }
    .bubble.user { background: #4f46e5; color: white; border-bottom-right-radius: 4px; }
    .bubble.typing { background: white; border: 1px solid #e5e7eb; padding: 14px; border-bottom-left-radius: 4px; }
    .dots span {
      display: inline-block; width: 6px; height: 6px;
      background: #9ca3af; border-radius: 50%; margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    .timestamp { font-size: 11px; color: #9ca3af; padding: 0 8px 2px; }
    .msg-row.user .timestamp { text-align: right; }
    .lead-badge {
      display: flex; align-items: center; gap: 8px;
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 10px; padding: 10px 14px;
      font-size: 12px; color: #166534; margin-left: 36px;
    }
    .stats-bar { display: flex; gap: 8px; padding: 12px 0 4px; flex-wrap: wrap; }
    .stat-pill {
      background: white; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #6b7280;
    }
    .stat-pill strong { color: #111; font-size: 13px; }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0 4px; }
    .chip {
      background: white; border: 1px solid #e5e7eb;
      border-radius: 20px; padding: 5px 12px;
      font-size: 12px; color: #374151; cursor: pointer; transition: all 0.15s;
    }
    .chip:hover { background: #f3f4f6; border-color: #4f46e5; color: #4f46e5; }
    .input-bar {
      display: flex; gap: 8px; align-items: flex-end;
      background: white; border: 1px solid #e5e7eb;
      border-radius: 16px; padding: 8px 8px 8px 16px;
    }
    .input-bar textarea {
      flex: 1; border: none; outline: none; resize: none;
      font-size: 14px; line-height: 1.5; background: transparent;
      color: #111; max-height: 120px; font-family: inherit;
    }
    .send-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: #4f46e5; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .send-btn:hover { background: #4338ca; }
    .send-btn:disabled { background: #d1d5db; cursor: not-allowed; }
    .mic-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: #16a34a; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .mic-btn:hover { background: #15803d; }
    .mic-btn.listening { background: #dc2626; animation: micpulse 1s infinite; }
    @keyframes micpulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-circle">AE</div>
  <div class="header-info">
    <h1>AutoEdge Motors — AI Assistant</h1>
    <p>Powered by Aria · Llama3 (local GPU)</p>
  </div>
  <div class="online-dot"></div>
</div>

<div class="main">
  <div class="stats-bar">
    <div class="stat-pill">Messages: <strong id="msg-count">0</strong></div>
    <div class="stat-pill">Leads: <strong id="lead-count">0</strong></div>
    <div class="stat-pill">Model: <strong>Llama3 · Local GPU</strong></div>
  </div>

  <div class="chat-window" id="chat-window"></div>

  <div class="quick-chips" id="chips">
    <div class="chip" onclick="sendChip('Show me cars under ₹15 lakhs')">Cars under ₹15L</div>
    <div class="chip" onclick="sendChip('I want to book a test drive')">Book test drive</div>
    <div class="chip" onclick="sendChip('Calculate EMI for a ₹12 lakh car')">EMI calculator</div>
    <div class="chip" onclick="sendChip('Book a service appointment')">Service booking</div>
    <div class="chip" onclick="sendChip('What SUVs do you have?')">SUVs available</div>
  </div>

  <div class="input-bar">
    <textarea id="input" placeholder="Ask about cars, EMI, test drives, service..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Voice input — Chrome only">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="1" width="6" height="11" rx="3"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
        <path d="M2 12L22 2L12 22L10 14L2 12Z"/>
      </svg>
    </button>
  </div>
</div>

<script>
var API_URL = "http://localhost:8000/chat";
var messages = [];
var leadCount = 0;
var msgCount = 0;
var recognition = null;
var isListening = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendChip(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

function getTime() {
  return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

function appendMessage(role, content, leadData) {
  var win = document.getElementById('chat-window');
  var row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'ai');

  var avatar = document.createElement('div');
  avatar.className = 'avatar' + (role === 'user' ? ' user-av' : '');
  avatar.textContent = role === 'user' ? 'You' : 'AI';

  var colWrap = document.createElement('div');
  colWrap.className = 'col-wrap';

  var bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'ai');
  bubble.textContent = content;

  var ts = document.createElement('div');
  ts.className = 'timestamp';
  ts.textContent = getTime();

  colWrap.appendChild(bubble);
  colWrap.appendChild(ts);

  if (role === 'user') {
    row.appendChild(colWrap);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(colWrap);
  }

  win.appendChild(row);

  if (leadData) {
    var badge = document.createElement('div');
    badge.className = 'lead-badge';
    badge.innerHTML = '✅ <div><strong>Lead captured</strong> · ' + leadData.name + ' · ' + leadData.phone + ' · Intent: <strong>' + leadData.intent_level + '</strong></div>';
    win.appendChild(badge);
    leadCount++;
    document.getElementById('lead-count').textContent = leadCount;
  }

  win.scrollTop = win.scrollHeight;
  msgCount++;
  document.getElementById('msg-count').textContent = msgCount;
}

function showTyping() {
  var win = document.getElementById('chat-window');
  var row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typing-indicator';
  var avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'AI';
  var bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  row.appendChild(avatar);
  row.appendChild(bubble);
  win.appendChild(row);
  win.scrollTop = win.scrollHeight;
}

function removeTyping() {
  var el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('chips').style.display = 'none';

  appendMessage('user', text);
  messages.push({ role: 'user', content: text });
  showTyping();

  try {
    var res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: messages, session_id: 'demo-' + Date.now() })
    });
    if (!res.ok) throw new Error('API error');
    var data = await res.json();
    removeTyping();
    appendMessage('assistant', data.reply, data.lead_captured);
    messages.push({ role: 'assistant', content: data.reply });
  } catch (err) {
    removeTyping();
    appendMessage('assistant', '⚠️ Could not connect to backend. Make sure FastAPI is running on port 8000.');
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Speech recognition not supported. Please use Chrome browser.');
    return;
  }

  if (isListening) {
    recognition.stop();
    return;
  }

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-IN';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = function() {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('input').placeholder = '🎤 Listening... speak now';
  };

  recognition.onresult = function(event) {
    var transcript = '';
    for (var i = 0; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    document.getElementById('input').value = transcript;
    autoResize(document.getElementById('input'));
    if (event.results[0].isFinal) {
      sendMessage();
    }
  };

  recognition.onend = function() {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('input').placeholder = 'Ask about cars, EMI, test drives, service...';
  };

  recognition.onerror = function(e) {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening');
    console.error('Speech error:', e.error);
  };

  recognition.start();
}

window.onload = function() {
  setTimeout(function() {
    appendMessage('assistant', "Hello! I'm Aria, your AI assistant at AutoEdge Motors. I can help you explore our car inventory, calculate EMIs, book test drives, or schedule service appointments. How can I assist you today?");
  }, 400);
};
</script>
</body>
</html>
